<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ArcMind AI</title>
<!-- ... (আপনার পূর্বের CSS একই থাকবে) ... -->
<style>
/* আপনার আগের সমস্ত CSS এখানে থাকবে */
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#020818,#0a1628,#0d1f3c);font-family:'Inter',sans-serif;color:#e2e8f0}
/* ... বাকি CSS আগের মতোই ... */
</style>
</head>
<body>
<div id="notif"></div>

<!-- HEADER -->
<header id="hdr">
  <div id="hdr-in">
    <div id="logo">
      <div id="logo-box">
        <svg width="34" height="34" viewBox="0 0 100 100" fill="none">
          <path d="M15 85C15 85 15 30 50 15C85 30 85 85 85 85L73 85C73 85 73 45 50 28C27 45 27 85 27 85Z" fill="#64748b"/>
        </svg>
      </div>
      <div><div class="aname">ArcMind AI</div><div class="asub">USDC Intelligence Layer</div></div>
    </div>
    <div id="hdr-r">
      <div id="chain-sw"><button class="cbn on">ETH</button><button class="cbn">BASE</button><button class="cbn">ARB</button></div>
      <button id="cbtn" onclick="showWallet()">&#x1F98A; Connect Wallet</button>
    </div>
  </div>
</header>

<main id="main">
  <!-- DASHBOARD -->
  <section id="pg-dash" class="pg on">
    <div id="welcome" style="text-align:center;padding:70px 20px">
      <h1>ArcMind AI</h1>
      <button onclick="showWallet()" style="padding:14px 36px;border-radius:28px;border:none;cursor:pointer;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;margin-top:20px">Connect Wallet</button>
    </div>
    <div id="dash-body" style="display:none">
       <div class="card"><h2>Dashboard</h2><p>Wallet Connected Successfully!</p></div>
    </div>
  </section>
</main>

<script>
    async function showWallet() {
        if (window.ethereum) {
            try {
                // মেটামাস্ক থেকে অ্যাকাউন্ট রিকোয়েস্ট করা
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const account = accounts[0];
                
                // বাটন আপডেট
                const cbtn = document.getElementById('cbtn');
                cbtn.innerHTML = `&#x2705; ${account.substring(0, 6)}...${account.slice(-4)}`;
                cbtn.classList.add('on');
                
                // ড্যাশবোর্ডের ভিউ পরিবর্তন (আপনার ডিজাইনের সাথে সামঞ্জস্য রেখে)
                document.getElementById('welcome').style.display = 'none';
                document.getElementById('dash-body').style.display = 'block';
                document.getElementById('chain-sw').style.display = 'flex';
                
                // সাকসেস নোটিফিকেশন
                const n = document.getElementById('notif');
                n.innerText = "Wallet Connected!";
                n.classList.add('on');
                setTimeout(() => n.classList.remove('on'), 3000);
            } catch (err) {
                console.error(err);
            }
        } else {
            alert("Please install MetaMask!");
        }
    }
</script>
</body>
</html>
