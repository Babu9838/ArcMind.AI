<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ArcMind AI</title>
<style>
  :root {
    --bg: #080c1a;
    --card: #0d1530;
    --card2: #111a38;
    --border: #1e2d5a;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00cec9;
    --text: #e0e6ff;
    --muted: #7f8db0;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* TOPBAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; background: rgba(8,12,26,0.97);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 40px; height: 40px; background: linear-gradient(135deg,#1a2550,#2a3a7a);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .logo-text { font-size: 17px; font-weight: 700; color: var(--white); }
  .logo-sub { font-size: 9px; color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; }

  /* WALLET BUTTON */
  .btn-wallet {
    background: linear-gradient(135deg, var(--accent), #8e7cf8);
    color: #fff; border: none; padding: 10px 18px; border-radius: 25px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 7px; transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-wallet:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-wallet.connected { background: linear-gradient(135deg,#00b894,#00cec9); }

  /* WALLET STATUS BAR */
  #wallet-status-bar {
    display: none; background: #0a1020; border-bottom: 1px solid var(--border);
    padding: 8px 20px; font-size: 12px; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  #wallet-status-bar.show { display: flex; }
  .ws-item { display: flex; align-items: center; gap: 5px; color: var(--muted); }
  .ws-item span.val { color: var(--text); font-weight: 600; }
  .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: #00b894; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* NAV */
  .nav { display: flex; gap: 0; border-bottom: 1px solid var(--border); overflow-x: auto; background: var(--bg); }
  .nav::-webkit-scrollbar { height: 3px; } .nav::-webkit-scrollbar-thumb { background: var(--border); }
  .nav-btn {
    padding: 14px 16px; background: none; border: none; color: var(--muted);
    font-size: 13px; cursor: pointer; white-space: nowrap; display: flex; align-items: center;
    gap: 5px; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .nav-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }
  .nav-btn:hover { color: var(--text); }

  /* SECTIONS */
  .section { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
  .section.active { display: block; }

  /* HERO */
  .hero { text-align: center; padding: 40px 20px 30px; }
  .hero-icon {
    width: 90px; height: 90px; background: linear-gradient(135deg,#1a2550,#2a3a7a);
    border-radius: 22px; display: flex; align-items: center; justify-content: center;
    font-size: 44px; margin: 0 auto 20px; box-shadow: 0 0 40px rgba(108,92,231,0.3);
  }
  .hero h1 { font-size: 36px; font-weight: 800; color: var(--white); margin-bottom: 10px; }
  .hero p { color: var(--muted); font-size: 15px; margin-bottom: 6px; }
  .hero .tags { font-size: 12px; color: #5a6a99; margin-bottom: 28px; }
  .hero-wallet-btn {
    background: linear-gradient(135deg, var(--accent), #8e7cf8);
    color: #fff; border: none; padding: 14px 36px; border-radius: 30px;
    font-size: 16px; font-weight: 600; cursor: pointer; display: inline-flex;
    align-items: center; gap: 8px; transition: all 0.2s; margin-bottom: 36px;
  }
  .hero-wallet-btn:hover { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,92,231,0.4); }
  .hero-wallet-btn.connected { background: linear-gradient(135deg,#00b894,#00cec9); }

  /* FEATURE CARDS */
  .feature-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 10px; }
  @media(max-width:600px) { .feature-row { grid-template-columns: repeat(3,1fr); gap: 8px; } }
  .feat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 10px; text-align: center;
  }
  .feat-card .fi { font-size: 26px; margin-bottom: 8px; }
  .feat-card .fn { font-size: 12px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .feat-card .fd { font-size: 10px; color: var(--muted); }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px;
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--white); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .stat-green { color: #00b894; }

  /* SECTION TITLE */
  .sec-title { font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

  /* INSIGHT */
  .insight-card {
    background: linear-gradient(135deg,#0f1e3a,#1a2550); border: 1px solid #2a3a7a;
    border-radius: 14px; padding: 16px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 20px;
  }
  .insight-icon { font-size: 28px; flex-shrink: 0; }
  .insight-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .insight-link { color: var(--accent2); font-size: 12px; margin-top: 6px; display: block; cursor: pointer; }

  /* SEND FORM */
  .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .form-input {
    width: 100%; background: #0a1020; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; color: var(--text); font-size: 14px;
    outline: none; margin-bottom: 14px;
  }
  .form-input:focus { border-color: var(--accent); }
  .resolved { font-size: 11px; color: var(--green); margin-top: -10px; margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
  .form-select {
    background: #0a1020; border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 14px; width: 100%;
  }
  .fee-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .fee-row span { color: #00b894; font-weight: 600; }
  .btn-primary {
    width: 100%; background: linear-gradient(135deg,var(--accent),#8e7cf8);
    color: #fff; border: none; padding: 14px; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .btn-secondary {
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
    padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
  }

  /* BRIDGE */
  .bridge-row { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 10px; align-items: center; margin-bottom: 14px; }
  .bridge-arrow { text-align: center; font-size: 20px; color: var(--accent2); }
  .bridge-info { background: #0a1020; border-radius: 10px; padding: 12px; margin-bottom: 14px; }
  .bridge-info-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .bridge-info-row:last-child { margin-bottom: 0; }
  .bi-label { color: var(--muted); }
  .bi-val { color: var(--text); font-weight: 600; }
  .bi-val.green { color: #00b894; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 999; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #0d1530; border: 1px solid var(--border); border-radius: 20px;
    padding: 28px 24px; max-width: 340px; width: 90%; text-align: center;
  }
  .modal h3 { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal-btn {
    width: 100%; background: linear-gradient(135deg,#f6851b,#e4761b);
    color: #fff; border: none; padding: 13px; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px;

function resetModalBtn() {
  const btn = document.getElementById('metamaskBtn');
  btn.innerHTML = '<span>🦊</span> <span>Connect MetaMask</span>';
  btn.disabled = false;
}

// ─── After Connect ─────────────────────────────────────────────────
async function onWalletConnected() {
  const shortAddr = walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);

  // Update top bar button
  document.getElementById('topWalletBtn').textContent = '✅ ' + shortAddr;
  document.getElementById('topWalletBtn').classList.add('connected');

  // Show status bar
  document.getElementById('ws-address').textContent = shortAddr;
  document.getElementById('ws-network').textContent = 'Arc Testnet';
  document.getElementById('wallet-status-bar').classList.add('show');

  // Show dashboard connected state
  document.getElementById('hero-section').style.display = 'none';
  document.getElementById('dashboard-connected').style.display = 'block';
  document.getElementById('dash-addr').textContent = shortAddr;
  document.getElementById('dash-network').textContent = 'Arc Testnet';

  // Fetch USDC balance
  await fetchUSDCBalance();
}

// ─── Fetch USDC Balance ────────────────────────────────────────────
async function fetchUSDCBalance() {
  document.getElementById('dash-usdc').textContent = '⏳ Loading...';
  document.getElementById('ws-balance').textContent = '...';

  try {
    // Use eth_call to call balanceOf on USDC contract
    const data = '0x70a08231' + walletAddress.replace('0x','').padStart(64,'0');

    const result = await window.ethereum.request({
      method: 'eth_call',
      params: [{
        to: USDC_ADDRESS,
        data: data
      }, 'latest']
    });

    // Get decimals
    let decimals = 6; // USDC default
    try {
      const decResult = await window.ethereum.request({
        method: 'eth_call',
        params: [{ to: USDC_ADDRESS, data: '0x313ce567' }, 'latest']
      });
      decimals = parseInt(decResult, 16);
    } catch(e) {}

    const raw = BigInt(result);
    const balance = Number(raw) / Math.pow(10, decimals);
    const formatted = balance.toFixed(2);

    document.getElementById('dash-usdc').textContent = '$' + formatted;
    document.getElementById('ws-balance').textContent = formatted + ' USDC';

  } catch (err) {
    console.error('USDC fetch error:', err);
    document.getElementById('dash-usdc').textContent = '0.00 USDC';
    document.getElementById('ws-balance').textContent = '0.00';
    // Don't show error toast - might just be 0 balance or wrong network
  }
}

// ─── Disconnect ────────────────────────────────────────────────────
function disconnectWallet() {
  walletConnected = false;
  walletAddress = null;
  document.getElementById('topWalletBtn').textContent = '🦊 Connect Wallet';
  document.getElementById('topWalletBtn').classList.remove('connected');
  document.getElementById('wallet-status-bar').classList.remove('show');
  document.getElementById('hero-section').style.display = 'block';
  document.getElementById('dashboard-connected').style.display = 'none';
  document.getElementById('heroWalletBtn').classList.remove('connected');
  showToast('Wallet disconnected', '#636e72');
}

let ensTimer;
function resolveENS(val) {
  clearTimeout(ensTimer);
  const el = document.getElementById('ens-resolved');
  if (val.endsWith('.eth') && val.length > 4) {
    ensTimer = setTimeout(() => { el.style.display = 'block'; }, 600);
  } else {
    el.style.display = 'none';
  }

// ─── Send USDC ─────────────────────────────────────────────────────
async function sendUSDC() {
  if (!walletConnected) { showToast('Please connect wallet first!', '#e67e22'); return; }
  const to = document.getElementById('send-to').value;
  const amount = document.getElementById('send-amount').value;
  if (!to || !amount) { showToast('Please fill all fields', '#e67e22'); return; }
  showToast('Transaction submitted! ✅', '#00b894');
}

// ─── AI Chat ───────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const chat = document.getElementById('chat-messages');
  chat.innerHTML += `<div style="text-align:right;margin:10px 0;"><div style="background:var(--accent);border-radius:12px;padding:10px 14px;display:inline-block;font-size:13px;color:#fff;max-width:80%;">${msg}</div></div>`;
  chat.innerHTML += `<div id="ai-typing" style="padding:10px 0;font-size:13px;color:var(--muted);">🤖 Thinking...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const context = walletConnected 
      ? `User wallet: ${walletAddress}, Network: Arc Testnet, Balance: check via USDC contract.` 
      : 'User not connected.';
    
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        system: 'You are ArcMind AI, a DeFi assistant for Arc Testnet USDC. Be concise, helpful, and DeFi-focused. Context: ' + context,
        messages: [{ role: 'user', content: msg }]
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || 'Sorry, I could not get a response.';
    document.getElementById('ai-typing')?.remove();
    chat.innerHTML += `<div style="margin:10px 0;"><div style="background:#1a2550;border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.6;max-width:85%;">🤖 ${reply}</div></div>`;
    chat.scrollTop = chat.scrollHeight;
  } catch(e) {
    document.getElementById('ai-typing')?.remove();
    chat.innerHTML += `<div style="margin:10px 0;"><div style="background:#1a2550;border-radius:12px;padding:12px;font-size:13px;color:#e74c3c;">Connection error. Try again.</div></div>`;
  }
}
