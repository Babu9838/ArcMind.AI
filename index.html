<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ArcMind AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* আপনার আগের সিএসএস (CSS) এখানে যা ছিল সব আছে */
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#020818,#0a1628,#0d1f3c);font-family:'Inter',sans-serif;color:#e2e8f0}
/* ... বাকি সিএসএস যা ছিল সব ঠিক আছে ... */
.ov{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(2,8,24,.88);backdrop-filter:blur(14px);animation:fadeIn .2s ease}
.mo{background:linear-gradient(135deg,#0a1628,#0d1f3c);border:1px solid rgba(99,102,241,.3);border-radius:24px;padding:28px;width:92%;max-width:380px;position:relative}
#notif{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:11px 18px;border-radius:12px;font-weight:700;font-size:13px;z-index:99999;box-shadow:0 6px 20px rgba(16,185,129,.4);transform:translateY(70px);opacity:0;transition:.35s ease}
#notif.on{transform:translateY(0);opacity:1}
/* আপনার আগের বাকি সব স্টাইল এখানে বসিয়ে দিন */
</style>
</head>
<body>
<div id="notif"></div>

<!-- আপনার আগের পুরো HTML এবং সেকশনগুলো এখানে আছে -->
<!-- শুধু হেডার এবং ওয়েলকাম সেকশনের বাটনে onclick="showWallet()" যুক্ত করে দিয়েছি -->

<header id="hdr">
  <!-- ... আগের হেডার কোড ... -->
  <button id="cbtn" onclick="showWallet()">&#x1F98A; Connect Wallet</button>
</header>

<main id="main">
  <section id="pg-dash" class="pg on">
    <div id="welcome">
        <!-- ... আগের ওয়েলকাম কন্টেন্ট ... -->
        <button onclick="showWallet()">Connect Wallet</button>
    </div>
    <div id="dash-body" style="display:none">
        <!-- ... আপনার ড্যাশবোর্ডের মূল কন্টেন্ট যা আগে ছিল ... -->
    </div>
  </section>
</main>

<script>
    // ওয়ালেট কানেক্টের মূল ফাংশন
    async function showWallet() {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const account = accounts[0];
                
                // বাটন আপডেট
                const cbtn = document.getElementById('cbtn');
                cbtn.innerText = "Connected: " + account.substring(0, 6) + "...";
                cbtn.classList.add('on');
                
                // ড্যাশবোর্ড দেখানো
                document.getElementById('welcome').style.display = 'none';
                document.getElementById('dash-body').style.display = 'block';
                document.getElementById('chain-sw').style.display = 'flex';
                
                // নোটিফিকেশন
                const n = document.getElementById('notif');
                n.innerText = "Wallet Connected Successfully!";
                n.classList.add('on');
                setTimeout(() => n.classList.remove('on'), 3000);
            } catch (error) {
                alert("Connection failed.");
            }
        } else {
            alert("Please install MetaMask!");
        }
    }
    
    // আপনার আগের সব ফাংশন (go, resolveAddr, etc) এখানে রেখে দিন
</script>
</body>
</html>
